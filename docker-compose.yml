version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scrublovela_db
    environment:
      POSTGRES_DB: scrublovela
      POSTGRES_USER: scrubuser
      POSTGRES_PASSWORD: scrubpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - scrublovela_net

  backend:
    build: ./backend
    container_name: scrublovela_api
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://scrubuser:scrubpass123@postgres:5432/scrublovela
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - scrublovela_net

  frontend:
    build: ./frontend
    container_name: scrublovela_web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - scrublovela_net

volumes:
  postgres_data:

networks:
  scrublovela_net:
    driver: bridge
